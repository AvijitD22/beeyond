version: "3.8"

services:
  backend:
    build: ./backend
    container_name: backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://backend:5000  // Change with your backend URL
    container_name: frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend